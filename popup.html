<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Pozzolanic Browser</title>
<style>
  body { font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 12px; min-width: 260px; margin: 0; color: #222; }
  h1 { font-size: 13px; margin: 0 0 10px; letter-spacing: 0.02em; text-transform: uppercase; color: #666; }
  .row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-top: 1px solid #eee; }
  .row:first-of-type { border-top: 0; }
  .host { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
  .count { color: #999; font-size: 11px; margin-left: 6px; }
  .switch { position: relative; display: inline-block; width: 36px; height: 20px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; inset: 0; background-color: #ccc; transition: 0.15s; border-radius: 20px; }
  .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; top: 3px; background: white; transition: 0.15s; border-radius: 50%; }
  .switch input:checked + .slider { background-color: #1f8a3c; }
  .switch input:checked + .slider:before { transform: translateX(16px); }
  footer { margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; color: #999; font-size: 11px; }
</style>
</head>
<body>
<h1>Pozzolanic Browser</h1>
<div id="hosts"></div>
<footer>Rules are bundled. To change them: edit <code>rules.js</code>.</footer>
<script src="rules.js"></script>
<script src="popup.js"></script>
</body>
</html>
